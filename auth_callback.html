<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logging in... — RizzUp AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #e84393, #fd7943);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .callback-box {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .callback-box h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .callback-box p {
      opacity: 0.9;
      font-size: 0.95rem;
    }
    .error-box {
      display: none;
      background: white;
      color: #e74c3c;
      padding: 24px 32px;
      border-radius: 16px;
      max-width: 400px;
      text-align: center;
    }
    .error-box h3 {
      margin-bottom: 12px;
      font-size: 1.2rem;
    }
    .error-box button {
      background: linear-gradient(135deg, #e84393, #fd7943);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      font-family: inherit;
    }
  </style>
<base target="_blank">
</head>
<body>

  <div class="callback-box" id="loading-state">
    <div class="spinner"></div>
    <h2>Logging you in... 🔐</h2>
    <p>Please wait while we complete your Google sign-in.</p>
  </div>

  <div class="error-box" id="error-state">
    <h3>❌ Login Failed</h3>
    <p id="error-message">Something went wrong.</p>
    <button onclick="window.location.href='index.html'">Try Again →</button>
  </div>

  <script>
    // Use window._supabase to avoid global conflict with Supabase library
    window._supabaseClient = window.supabase.createClient(
      'https://xzdjxvitqktsfeuzshik.supabase.co',
      'sb_publishable_zCeAZp1ZBclQ_tsgDbBVyQ_jHyTCIoW'
    );

    let sessionChecked = false;

    async function handleCallback() {
      try {
        // Method 1: Listen for auth state change (most reliable)
        window._supabaseClient.auth.onAuthStateChange(async (event, session) => {
          console.log('Auth event:', event);

          if (event === 'SIGNED_IN' && session) {
            if (!sessionChecked) {
              sessionChecked = true;
              await handleSuccess(session);
            }
          }
        });

        // Method 2: Also try direct session check after delay
        setTimeout(async () => {
          if (!sessionChecked) {
            const { data: { session }, error } = await window._supabaseClient.auth.getSession();

            if (error) {
              console.error('Session error:', error);
              return;
            }

            if (session) {
              sessionChecked = true;
              await handleSuccess(session);
            } else {
              // Method 3: Check if there's an error in URL
              const url = new URL(window.location.href);
              const error = url.searchParams.get('error');
              const errorDesc = url.searchParams.get('error_description');

              if (error) {
                showError(errorDesc || 'Authentication failed. Please try again.');
              } else if (!sessionChecked) {
                // No session and no error — maybe already processed
                // Try one more time
                setTimeout(async () => {
                  const { data: { session: finalSession } } = await window._supabaseClient.auth.getSession();
                  if (finalSession && !sessionChecked) {
                    sessionChecked = true;
                    await handleSuccess(finalSession);
                  } else if (!sessionChecked) {
                    showError('Unable to complete login. Please try again.');
                  }
                }, 2000);
              }
            }
          }
        }, 3000);

      } catch (err) {
        console.error('Callback error:', err);
        showError(err.message || 'Something went wrong. Please try again.');
      }
    }

    async function handleSuccess(session) {
      const user = session.user;

      // Create/update user profile in DB
      try {
        const { data: existingUser, error: fetchError } = await window._supabaseClient
          .from('users')
          .select('*')
          .eq('id', user.id)
          .single();

        if (fetchError || !existingUser) {
          // New Google user — create profile
          const name = user.user_metadata?.full_name || user.user_metadata?.name || 'User';
          const email = user.email;
          // Google doesn't provide gender by default, use 'male' as default
          const gender = 'male';

          console.log('Creating new profile for Google user:', { name, email, gender });

          await window._supabaseClient.from('users').upsert({
            id: user.id,
            name: name,
            email: email,
            gender: gender,
            plan: 'free',
            total_msgs: 0,
            sessions: 0,
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString(),
          }, { onConflict: 'id' });
        } else {
          console.log('Existing user found:', existingUser);
          // Ensure gender is set on existing user
          if (!existingUser.gender) {
            await window._supabaseClient.from('users')
              .update({ gender: 'male', updated_at: new Date().toISOString() })
              .eq('id', user.id);
          }
        }
      } catch (e) {
        console.error('Profile creation error:', e);
      }

      // Redirect to app
      window.location.href = 'app.html';
    }

    function showError(message) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }

    // Run on load
    handleCallback();
  </script>
</body>
</html>
