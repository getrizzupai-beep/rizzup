<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RizzUp AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- LANDING -->
<div id="landingView">
  <h1>RizzUp AI 💘</h1>
  <button onclick="openAuthModal()">Try Free</button>
</div>

<!-- AUTH MODAL -->
<div id="authModal" style="display:none;">
  <h2>Login / Signup</h2>

  <input id="mName" placeholder="Your Name"><br><br>
  <input id="mEmail" placeholder="Email"><br><br>

  <button onclick="doSignup()">Signup</button>
  <button onclick="quickSignup()">Login</button>
</div>

<!-- APP -->
<div id="appView" style="display:none;">
  <h2>Welcome to App 🚀</h2>
  <button onclick="doLogout()">Logout</button>
</div>

<script>
function openAuthModal(){
  document.getElementById("authModal").style.display = "block";
}

// TEMP FAKE LOGIN (no Firebase)
function doSignup(){
  const email = document.getElementById("mEmail").value;

  if(!email){
    alert("Enter email");
    return;
  }

  localStorage.setItem("user", email);
  showApp();
}

function quickSignup(){
  doSignup();
}

function doLogout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  document.getElementById("landingView").style.display = "none";
  document.getElementById("appView").style.display = "block";
}

// auto login
if(localStorage.getItem("user")){
  showApp();
}
</script>

</body>
</html>
