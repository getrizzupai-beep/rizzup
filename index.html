<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RizzUp AI — India's #1 AI Dating Coach</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Auth Modal - Added Styles */
        .auth-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        .auth-modal.open {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #authModalBox {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .auth-close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
        }
        .auth-close-btn:hover { color: #fff; }
        .auth-title { font-size: 26px; font-weight: 700; margin: 0 0 8px 0; }
        .auth-subtitle { color: #888; margin: 0 0 25px 0; font-size: 14px; }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #333;
            border-radius: 12px;
            background: #16213e;
            color: white;
            font-size: 15px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .auth-input:focus { outline: none; border-color: #e94560; }
        .auth-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .auth-btn:hover { transform: translateY(-2px); }
        .auth-btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
        }
        .auth-btn-primary:hover {
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .auth-btn-google {
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-btn-google:hover { background: #f5f5f5; }
        .auth-divider {
            text-align: center;
            color: #555;
            margin: 18px 0;
            font-size: 13px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 18px;
            color: #888;
            font-size: 14px;
        }
        .auth-switch a { color: #e94560; cursor: pointer; text-decoration: none; }
        .auth-switch a:hover { text-decoration: underline; }
        .pass-toggle {
            position: relative;
        }
        .pass-toggle span {
            position: absolute;
            right: 12px;
            top: 13px;
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }
        .login-methods {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .meth-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 10px;
            background: transparent;
            color: #888;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .meth-btn.active {
            border-color: #e94560;
            background: rgba(233,69,96,0.15);
            color: #e94560;
        }
        .pass-section, .otp-section { display: none; }
        .forgot-link {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .forgot-link a { color: #e94560; cursor: pointer; }
        .otp-note {
            background: rgba(233,69,96,0.1);
            border: 1px solid #e94560;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            color: #e94560;
            font-size: 13px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 15px;
        }
        .success-msg {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .back-link {
            color: #888;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
        }
        .back-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <!-- Auth Modal - Added to index.html -->
    <div id="authModal" class="auth-modal">
        <div id="authModalBox"></div>
    </div>

    <!-- Landing View -->
    <div id="landingView">
        <nav class="navbar">
            <div class="nav-left">
                <a href="#" class="nav-logo">
                    <span class="logo-icon">💘</span>
                    <span class="logo-text">Rizz Up</span>
                </a>
                <a href="#features" class="nav-link">Features</a>
                <a href="#scenarios" class="nav-link">Scenarios</a>
                <a href="#pricing" class="nav-link">Pricing</a>
                <a href="#faq" class="nav-link">FAQ</a>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-btn-outline" onclick="openAuthModal('login'); return false;">Login</a>
                <a href="#" class="nav-btn-primary" onclick="openAuthModal('signup'); return false;">Sign Up Free →</a>
            </div>
        </nav>
        
        <!-- Rest of landing page stays the same -->
        <!-- ... (hero section, features, etc.) ... -->
    </div>

    <!-- App View (hidden by default) -->
    <div id="appView" style="display:none;">
        <!-- Dashboard, Chat, Course, Upgrade sections -->
    </div>

    <script src="js/app.js"></script>
</body>
</html>
