<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAdaZDY3LOAfPSVlCMKxMPLDV1OZxfL9oU",
  authDomain: "rizzup-a9aab.firebaseapp.com",
  projectId: "rizzup-a9aab",
  storageBucket: "rizzup-a9aab.firebasestorage.app",
  messagingSenderId: "1054041538795",
  appId: "1:1054041538795:web:cb2b22d4725aaab2853eae",
  measurementId: "G-XWZ9EV6C4X"
};

// Init
const app = initializeApp(firebaseConfig);
getAnalytics(app);
const auth = getAuth(app);

// =====================
// ✅ SIGNUP
// =====================
window.doSignup = async function () {
  const email = document.getElementById("mEmail").value;
  const password = "123456"; // fixed simple password

  if (!email) {
    alert("Enter email");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Signup successful 🚀");
  } catch (err) {
    alert(err.message);
  }
};

// =====================
// ✅ LOGIN
// =====================
window.quickSignup = async function () {
  const email = document.getElementById("mEmail").value;
  const password = "123456";

  if (!email) {
    alert("Enter email");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful ✅");
  } catch (err) {
    alert(err.message);
  }
};

// =====================
// ✅ LOGOUT
// =====================
window.doLogout = async function () {
  try {
    await signOut(auth);
    alert("Logged out");
  } catch (err) {
    alert(err.message);
  }
};

// =====================
// ✅ AUTO LOGIN SWITCH
// =====================
onAuthStateChanged(auth, (user) => {
  const landing = document.getElementById("landingView");
  const appView = document.getElementById("appView");

  if (user) {
    landing.style.display = "none";
    appView.style.display = "block";
  } else {
    landing.style.display = "block";
    appView.style.display = "none";
  }
});

</script>
