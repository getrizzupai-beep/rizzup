<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <div style="text-align:center;font-size:36px;margin-bottom:8px">💘</div>
    
    <h3>Join RizzUp AI</h3>
    <p>Enter your details to start practicing.</p>

    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input id="mName" class="form-input" placeholder="Rahul Kumar" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="mEmail" class="form-input" placeholder="rahul@gmail.com" type="email">
    </div>

    <button class="btn-primary" style="width:100%;margin-bottom:12px" onclick="doSignup()">
      Start Practicing Free →
    </button>

    <div class="modal-divider"><span>or</span></div>

    <button class="btn-google-modal" onclick="quickSignup()">
      ⚡ Quick Start
    </button>

    <div style="font-size:12px;color:var(--muted);text-align:center;margin-top:14px">
      🔒 Your data is safe · No API key required
    </div>
  </div>
</div>
