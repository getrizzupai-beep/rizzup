<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";

// ✅ ADD THIS (AUTH)
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdaZDY3LOAfPSVlCMKxMPLDV1OZxfL9oU",
  authDomain: "rizzup-a9aab.firebaseapp.com",
  projectId: "rizzup-a9aab",
  storageBucket: "rizzup-a9aab.firebasestorage.app",
  messagingSenderId: "1054041538795",
  appId: "1:1054041538795:web:cb2b22d4725aaab2853eae",
  measurementId: "G-XWZ9EV6C4X"
};

// Init
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);

// ============================
// ✅ SIGNUP
// ============================
window.doSignup = async function () {
  const email = document.getElementById("mEmail").value;
  const password = document.getElementById("mApiKey").value; // temp use API key as password

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Signup successful 🚀");
    closeAuthModal();
  } catch (err) {
    alert(err.message);
  }
};

// ============================
// ✅ LOGIN (Quick start button)
// ============================
window.quickSignup = async function () {
  const email = document.getElementById("mEmail").value;
  const password = document.getElementById("mApiKey").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login successful ✅");
    closeAuthModal();
  } catch (err) {
    alert(err.message);
  }
};

// ============================
// ✅ LOGOUT
// ============================
window.doLogout = async function () {
  await signOut(auth);
  alert("Logged out");
  location.reload();
};

// ============================
// ✅ AUTO LOGIN STATE
// ============================
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("landingView").style.display = "none";
    document.getElementById("appView").style.display = "block";
  } else {
    document.getElementById("landingView").style.display = "block";
    document.getElementById("appView").style.display = "none";
  }
});

</script>
