<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dating Mastery - App</title>
  <link rel="stylesheet" href="css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span>💘</span>
        <span>Dating Mastery</span>
      </div>
      
      <nav>
        <ul class="nav-menu">
          <li class="nav-item">
            <a class="nav-link active" onclick="showTab('dashboard')">
              <span class="nav-icon">📊</span>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="showTab('course')">
              <span class="nav-icon">📚</span>
              <span>Course</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="showTab('chat')">
              <span class="nav-icon">💬</span>
              <span>Practice Chat</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" onclick="showTab('badges')">
              <span class="nav-icon">🏆</span>
              <span>Badges</span>
            </a>
          </li>
        </ul>
      </nav>
      
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <a class="nav-link" onclick="logoutUser()">
          <span class="nav-icon">🚪</span>
          <span>Logout</span>
        </a>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Tab -->
      <div id="dashboardTab" class="tab-content">
        <h1 style="margin-bottom: 24px;">Dashboard</h1>
        
        <!-- Stats -->
        <div class="user-stats">
          <div class="stat-card">
            <div class="stat-value" id="userXP">0 XP</div>
            <div class="stat-label">Experience</div>
            <div class="level-badge" id="levelBadge" style="background: #6B7280;">
              <span id="userLevel">Rookie</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="userLevelNum">Level 1</div>
            <div class="stat-label">Current Level</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="userStreak">0 🔥</div>
            <div class="stat-label">Day Streak</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="completedDays">0/30</div>
            <div class="stat-label">Days Completed</div>
          </div>
        </div>
        
        <!-- Progress -->
        <div class="progress-section">
          <div class="progress-header">
            <span class="progress-title">Course Progress</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
          </div>
        </div>
        
        <!-- Badges Preview -->
        <div class="badges-section">
          <h3>🏆 Your Badges</h3>
          <div class="badges-grid" id="badgesContainer">
            <!-- Badges rendered by JS -->
          </div>
        </div>
      </div>
      
      <!-- Course Tab -->
      <div id="courseTab" class="tab-content" style="display: none;">
        <h1 style="margin-bottom: 24px;">30-Day Course</h1>
        <div class="course-grid" id="courseGrid">
          <!-- Course cards rendered by JS -->
        </div>
      </div>
      
      <!-- Chat Tab -->
      <div id="chatTab" class="tab-content" style="display: none;">
        <h1 style="margin-bottom: 24px;">Practice Chat</h1>
        
        <div class="chat-container">
          <div class="scenario-selector">
            <h3>Choose a Scenario</h3>
            <div class="scenario-buttons" id="scenarioButtons">
              <!-- Scenario buttons rendered by JS -->
            </div>
          </div>
          
          <div class="scenario-info-card" id="scenarioInfo">
            <!-- Scenario info rendered by JS -->
          </div>
          
          <div class="chat-messages" id="chatMessages">
            <!-- Messages rendered by JS -->
          </div>
          
          <div class="chat-input-container">
            <input 
              type="text" 
              class="chat-input" 
              id="chatInput" 
              placeholder="Type your message..."
              onkeypress="handleChatKey(event)"
            >
            <button class="chat-send-btn" onclick="sendChatMessage()">Send</button>
          </div>
        </div>
      </div>
      
      <!-- Badges Tab -->
      <div id="badgesTab" class="tab-content" style="display: none;">
        <h1 style="margin-bottom: 24px;">All Badges</h1>
        <div class="badges-grid" id="allBadgesContainer">
          <!-- All badges rendered by JS -->
        </div>
      </div>
    </main>
  </div>
  
  <!-- Course Reader Modal -->
  <div class="modal-overlay" id="courseModal" onclick="if(event.target === this) closeCourseModal()">
    <div class="modal-content" id="courseModalContent">
      <!-- Modal content rendered by JS -->
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/chat.js"></script>
  
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', async () => {
      initAuth();
      
      const isAuth = await checkAuth();
      if (!isAuth) {
        window.location.href = 'index.html';
        return;
      }
      
      initDashboard();
      initChat();
    });
    
    // Tab switching
    function showTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.style.display = 'none';
      });
      
      // Show selected tab
      document.getElementById(tabName + 'Tab').style.display = 'block';
      
      // Update nav active state
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
      });
      event.target.closest('.nav-link').classList.add('active');
      
      // Refresh content
      if (tabName === 'dashboard') {
        renderStats();
        renderBadges();
      } else if (tabName === 'course') {
        renderCourseGrid();
      } else if (tabName === 'chat') {
        renderScenarioButtons();
      } else if (tabName === 'badges') {
        renderAllBadges();
      }
    }
    
    // Render all badges for badges tab
    function renderAllBadges() {
      const container = document.getElementById('allBadgesContainer');
      if (!container) return;
      
      const user = getCurrentUser();
      const earnedBadges = user?.profile?.badges || [];
      
      container.innerHTML = CONFIG.BADGES.map(badge => {
        const isEarned = earnedBadges.includes(badge.id);
        return `
          <div class="badge ${isEarned ? 'earned' : 'locked'}" style="padding: 24px;">
            <span class="badge-icon" style="font-size: 48px;">${isEarned ? badge.icon : '🔒'}</span>
            <span class="badge-name" style="font-size: 14px; margin-top: 12px;">${badge.name}</span>
            <p style="font-size: 12px; color: var(--gray); margin-top: 4px;">${badge.desc}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
